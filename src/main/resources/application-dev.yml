spring:
  datasource:
    url: jdbc:h2:mem:church_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org:
      springframework:
        security: DEBUG

jwt:
  secret: ${JWT_SECRET:dev-only-local-secret-change-me-1234567890abcdef123456}
  cookie-secure: false

app:
  seed-default-admin: ${APP_SEED_DEFAULT_ADMIN:true}
  default-admin-email: ${APP_DEFAULT_ADMIN_EMAIL:admin@example.com}
  default-admin-password: ${APP_DEFAULT_ADMIN_PASSWORD:password}
  default-admin-name: ${APP_DEFAULT_ADMIN_NAME:관리자}
