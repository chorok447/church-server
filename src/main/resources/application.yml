spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

server:
  port: ${SERVER_PORT:4000}

logging:
  level:
    org:
      springframework:
        security: DEBUG

jwt:
  secret: ${JWT_SECRET:vmfhaltnormlow874nd_982ls0t6_asdfghjkl1234567890abcdef}
  expiration: ${JWT_EXPIRATION:36000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}